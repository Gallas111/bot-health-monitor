name: bot-health

# 5분마다 핵심 봇/서비스 /health 를 matrix 로 폴링.
# - 200 OK → 통과
# - 5초 간격 3회 재시도 후에도 503 / 타임아웃 / 기타 → 해당 서비스 job fail → GitHub 자동 알림(이메일 + 모바일 푸시, secrets 0 으로도 동작)
#   (단발성 콜드스타트/네트워크 블립 오탐 방지. 한 번이라도 200 받으면 즉시 통과)
# - ALERT_TG_BOT_TOKEN + ALERT_TG_CHAT_ID secrets 등록 시 텔레그램 알림 추가
# strategy.fail-fast:false → 한 서비스가 죽어도 나머지 검사는 계속 진행, 각 job 독립 알림.
#
# PUBLIC 리포라 GH Actions 무제한 무료. 코드에 민감 정보 없음.
# 알림 봇은 모니터 대상 봇과 다른 봇이어야 함 (모니터 대상이 죽으면 그 봇으로 알림도 못 옴).
#
# ▶ 서비스 추가: 아래 matrix.include 에 { name, url } 한 줄만 추가하면 됨.
#   (HTTP /health 200 을 반환하는 서비스만. EC2 systemd 봇은 Caddy 에 health 경로 추가 후 등록)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: reversal-alert-bot
            url: https://reversal-alert-bot.j-810.workers.dev/health
          - name: superbuysell-bot
            # 2026-07-03: coinyeon 폐기 → EC2 게이트웨이 proxy.goraestory.com 로 이사 (구 bybit-proxy.coinyeon.net = DNS 소멸 → 000 오탐)
            url: https://proxy.goraestory.com/superbuysell-health
          # 페이퍼봇 5종(pump·pump-v2·dump·dump-v2·dipbuy)은 6/8 CF Worker 삭제 → EC2 paper-bots.service 단일 이전.
          # 워커 URL은 전부 404 라 모니터에서 제거(오탐 메일 방지). 라이브니스는 systemd + 일일 TG 보고 + bot-watchdog 로 커버.
          # 재감시 필요 시: EC2 watchdog 에 data.sqlite last-run 나이 체크 추가(공개 /health 신설 불필요).
    steps:
      - name: Probe /health
        env:
          URL: ${{ matrix.url }}
        run: |
          set +e
          attempts=3
          for i in $(seq 1 "$attempts"); do
            code=$(curl -sS -m 10 -o /tmp/body -w '%{http_code}' "$URL")
            rc=$?
            echo "attempt $i/$attempts: exit=$rc http=$code"
            if [ "$rc" -eq 0 ] && [ "$code" = "200" ]; then
              cat /tmp/body 2>/dev/null || true
              echo
              echo "${{ matrix.name }} OK (attempt $i)"
              exit 0
            fi
            [ "$i" -lt "$attempts" ] && sleep 5
          done
          cat /tmp/body 2>/dev/null || true
          echo
          echo "::error::${{ matrix.name }} DOWN after $attempts attempts (last: exit=$rc http=$code)"
          exit 1
      - name: Telegram alert (optional)
        if: failure()
        env:
          TG_BOT: ${{ secrets.ALERT_TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.ALERT_TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT" ] || [ -z "$TG_CHAT" ]; then
            echo "alert secrets not configured — skip telegram (GitHub email/push 만 발송)"
            exit 0
          fi
          MSG="🚨 ${{ matrix.name }} DOWN | ${{ matrix.url }} | run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "https://api.telegram.org/bot$TG_BOT/sendMessage" \
            -d "chat_id=$TG_CHAT" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=$MSG"
